---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: "common"

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: "cluster-queue-common"
spec:
  cohort: "global-cohort" 
  namespaceSelector: {} # match all.
  resourceGroups:
  - coveredResources: ["cpu", "memory"]
    flavors:
    - name: "common"
      resources:
      - name: "cpu"
        nominalQuota: 48
      - name: "memory"
        nominalQuota: 96Gi
---

apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: "cluster-queue-a"
spec:
  cohort: "ab-cohort"
  preemption:
    reclaimWithinCohort: Any  # ensures that each can use their alotted compute quota
  flavorFungibility:
    whenCanBorrow: Borrow  # this is the default but I'm making it explicit here
    whenCanPreempt: Preempt  # ensures that accelerators aren't hit with compute workloads
  namespaceSelector: {} # match all.
  resourceGroups:
  - coveredResources: ["cpu", "memory", "foo.com/a"]
    flavors:
    - name: "common"
      resources:
      - name: "cpu"
        nominalQuota: 24
      - name: "memory"
        nominalQuota: 48Gi
      - name: "foo.com/a"
        nominalQuota: 0
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: "cluster-queue-b"
spec:
  cohort: "cohort-ab"
  preemption:
    reclaimWithinCohort: Any  # ensures that each can use their alotted compute quota
  flavorFungibility:
    whenCanBorrow: Borrow  # this is the default but I'm making it explicit here
    whenCanPreempt: Preempt  # ensures that accelerators aren't hit with compute workloads
  namespaceSelector: {} # match all.
  resourceGroups:
  - coveredResources: ["cpu", "memory", "foo.com/b"]
    flavors:
    - name: "common"
      resources:
      - name: "cpu"
        nominalQuota: 16        
      - name: "memory"
        nominalQuota: 32Gi
      - name: "foo.com/b"
        nominalQuota: 0

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  namespace: kueue-demo # LocalQueue under team-a namespace
  name: local-queue-a
  annotations:
    kueue.x-k8s.io/default-queue: 'true'
spec:
  clusterQueue: cluster-queue-a
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  namespace: kueue-demo # LocalQueue under team-b namespace
  name: local-queue-b
spec:
  clusterQueue: cluster-queue-b






